version: '3.8'

services:
  eurekaserver:
    image: ${REGISTRY_USERNAME}/eurekaserver:latest
    container_name: eurekaserver
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - ecart-network
    restart: always

  # Template configuration for your remaining 4 microservices:
  service2:
    image: ${REGISTRY_USERNAME}/service2:latest
    container_name: service2
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8761/eureka/
    networks:
      - ecart-network
    depends_on:
      - eurekaserver
    restart: always

  service3:
    image: ${REGISTRY_USERNAME}/service3:latest
    container_name: service3
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8761/eureka/
    networks:
      - ecart-network
    depends_on:
      - eurekaserver
    restart: always

  service4:
    image: ${REGISTRY_USERNAME}/service4:latest
    container_name: service4
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8761/eureka/
    networks:
      - ecart-network
    depends_on:
      - eurekaserver
    restart: always

  service5:
    image: ${REGISTRY_USERNAME}/service5:latest
    container_name: service5
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eurekaserver:8761/eureka/
    networks:
      - ecart-network
    depends_on:
      - eurekaserver
    restart: always

networks:
  ecart-network:
    driver: bridge
