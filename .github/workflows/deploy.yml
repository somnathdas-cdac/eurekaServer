
name: CI/CD Pipeline to Oracle Cloud VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Authenticate to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push Eureka Server Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.REGISTRY_USERNAME }}/eurekaserver:latest

    - name: Copy docker-compose.yml to Oracle Cloud VM
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.OCI_VM_IP }}
        username: ${{ secrets.OCI_VM_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        source: "docker-compose.yml"
        target: "~/app/"

    - name: Execute Isolated Remote Deployment via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.OCI_VM_IP }}
        username: ${{ secrets.OCI_VM_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        script: |
          # 1. Clear any loose compose files in the root app directory to prevent file conflicts
          rm -f ~/app/docker-compose.yml
          
          # 2. Create an isolated, dedicated directory for the Eureka service
          mkdir -p ~/app/eureka-server
          
          # 3. Locate the freshly uploaded compose file and move it into the isolated directory
          find ~/app -name "docker-compose.yml" -exec mv {} ~/app/eureka-server/ \; 2>/dev/null || true
          
          # 4. Navigate into the isolated deployment folder
          cd ~/app/eureka-server
          
          # 5. Generate a clean environment variable file locally
          echo "REGISTRY_USERNAME=${{ secrets.REGISTRY_USERNAME }}" > .env
          
          # 6. Explicitly authenticate the host daemon to Docker Hub
          echo "${{ secrets.REGISTRY_PASSWORD }}" | sudo docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
          
          # 7. Pull and spin up only the Eureka service declared in this folder's file
          sudo docker compose pull
          sudo docker compose up -d

