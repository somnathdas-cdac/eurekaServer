name: CI/CD Pipeline to Oracle Cloud VM

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Authenticate to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and Push Eureka Server Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.REGISTRY_USERNAME }}/eurekaserver:latest

    - name: Copy docker-compose.yml to Oracle Cloud VM
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.OCI_VM_IP }}
        username: ${{ secrets.OCI_VM_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        source: "docker-compose.yml"
        target: "~/app/"

    - name: Execute Remote Deployment via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.OCI_VM_IP }}
        username: ${{ secrets.OCI_VM_USER }}
        key: ${{ secrets.OCI_SSH_KEY }}
        script: |
          cd ~/app/
          # Write the environment variable to a persistent runtime file on the host
          echo "REGISTRY_USERNAME=${{ secrets.REGISTRY_USERNAME }}" > .env
          
          # Force Docker to re-authenticate if downloading from a private repository
          echo "${{ secrets.REGISTRY_PASSWORD }}" | sudo docker login -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin
          
          sudo docker compose down
          sudo docker compose pull
          sudo docker compose up -d
